name: ScreenCI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

  smoke-test:
    name: Init + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run screenci init
        env:
          SCREENCI_INIT_CWD: ${{ runner.temp }}/screenci-smoke
        run: |
          mkdir -p "$SCREENCI_INIT_CWD"
          node bin/screenci.js init smoke-project --yes

      - name: Install local screenci build
        working-directory: ${{ runner.temp }}/screenci-smoke/smoke-project
        run: npm install "${{ github.workspace }}"

      - name: Run screenci test
        working-directory: ${{ runner.temp }}/screenci-smoke/smoke-project
        run: npx screenci test
