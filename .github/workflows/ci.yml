name: ScreenCI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

  smoke-test:
    name: Init + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack local screenci package
        id: pack
        run: |
          echo "tarball=$(node -p 'const pkg=require("./package.json"); `${pkg.name}-${pkg.version}.tgz`')" >> "$GITHUB_OUTPUT"
          npm pack

      - name: Run screenci init
        run: node bin/screenci.js init smoke-project --yes

      - name: Use local screenci tarball instead of published npm version
        working-directory: smoke-project
        run: |
          npm pkg set "dependencies.screenci=file:../${{ steps.pack.outputs.tarball }}"
          npm install

      - name: Run screenci test
        working-directory: smoke-project
        run: npx screenci test
