name: ScreenCI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

  smoke-test:
    name: Init + Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu / bash
            os: ubuntu-latest
            shell_name: bash
          - name: macos / bash
            os: macos-latest
            shell_name: bash
          - name: windows / powershell
            os: windows-latest
            shell_name: pwsh
          - name: windows / cmd
            os: windows-latest
            shell_name: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack local screenci package
        run: npm pack

      - name: Prepare smoke project
        run: >-
          node -e "const fs=require('node:fs'); const path=require('node:path'); const pkg=require('./package.json'); const tarball=pkg.name + '-' + pkg.version + '.tgz'; fs.mkdirSync('smoke-project', { recursive: true }); fs.copyFileSync(path.join(process.cwd(), tarball), path.join(process.cwd(), 'smoke-project', tarball));"

      - name: Set local screenci dependency for init
        run: node -e "const fs=require('node:fs'); const pkg=require('./package.json'); fs.appendFileSync(process.env.GITHUB_ENV, 'SCREENCI_INIT_SCREENCI_DEPENDENCY=file:./' + pkg.name + '-' + pkg.version + '.tgz\n')"

      - name: Run screenci init
        working-directory: smoke-project
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} node ../bin/screenci.js init smoke-project --yes --verbose

      - name: Run screenci test
        working-directory: smoke-project
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} npx screenci test
