name: ScreenCI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

  smoke-test:
    name: Init + Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu / bash
            os: ubuntu-latest
            shell_name: bash
          - name: macos / bash
            os: macos-latest
            shell_name: bash
          - name: windows / powershell
            os: windows-latest
            shell_name: pwsh
          - name: windows / cmd
            os: windows-latest
            shell_name: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Install package dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Pack local screenci package
        run: npm pack

      - name: Pack local create-screenci package
        working-directory: create-screenci
        run: npm pack

      - name: Prepare smoke projects
        run: >-
          node -e "const fs=require('node:fs'); const path=require('node:path'); const screenciPkg=require('./package.json'); const createPkg=require('./create-screenci/package.json'); const screenciTarball=screenciPkg.name + '-' + screenciPkg.version + '.tgz'; const createTarball=createPkg.name + '-' + createPkg.version + '.tgz'; for (const dir of ['smoke-direct-npm', 'smoke-direct-pnpm', 'smoke-create-npm', 'smoke-create-pnpm']) { fs.mkdirSync(dir, { recursive: true }); fs.copyFileSync(path.join(process.cwd(), screenciTarball), path.join(process.cwd(), dir, screenciTarball)); fs.copyFileSync(path.join(process.cwd(), 'create-screenci', createTarball), path.join(process.cwd(), dir, createTarball)); }"

      - name: Set local screenci dependency for init
        run: node -e "const fs=require('node:fs'); const pkg=require('./package.json'); fs.appendFileSync(process.env.GITHUB_ENV, 'SCREENCI_INIT_SCREENCI_DEPENDENCY=file:./' + pkg.name + '-' + pkg.version + '.tgz\n')"

      - name: Set local create-screenci tarball name
        run: node -e "const fs=require('node:fs'); const pkg=require('./create-screenci/package.json'); fs.appendFileSync(process.env.GITHUB_ENV, 'CREATE_SCREENCI_TARBALL=' + pkg.name + '-' + pkg.version + '.tgz\n')"

      - name: Run screenci init with npm
        working-directory: smoke-direct-npm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} node ../bin/screenci.js init smoke-project --package-manager npm --yes --verbose

      - name: Run screenci test with npm
        working-directory: smoke-direct-npm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} npx screenci test

      - name: Run screenci init with pnpm
        working-directory: smoke-direct-pnpm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} node ../bin/screenci.js init smoke-project --package-manager pnpm --yes --verbose

      - name: Run screenci test with pnpm
        working-directory: smoke-direct-pnpm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} pnpm exec screenci test

      - name: Run create-screenci with npm
        working-directory: smoke-create-npm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} npm exec --yes --package=file:./${{ env.CREATE_SCREENCI_TARBALL }} --package=${{ env.SCREENCI_INIT_SCREENCI_DEPENDENCY }} -- create-screenci smoke-project --package-manager npm --yes --verbose

      - name: Run generated screenci test with npm
        working-directory: smoke-create-npm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} npx screenci test

      - name: Run create-screenci with pnpm
        working-directory: smoke-create-pnpm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} pnpm dlx --package=file:./${{ env.CREATE_SCREENCI_TARBALL }} --package=${{ env.SCREENCI_INIT_SCREENCI_DEPENDENCY }} create-screenci smoke-project --package-manager pnpm --yes --verbose

      - name: Run generated screenci test with pnpm
        working-directory: smoke-create-pnpm
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} pnpm exec screenci test
