name: ScreenCI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

  smoke-test:
    name: Init + Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu / bash
            os: ubuntu-latest
            shell_name: bash
          - name: macos / bash
            os: macos-latest
            shell_name: bash
          - name: windows / powershell
            os: windows-latest
            shell_name: pwsh
          - name: windows / cmd
            os: windows-latest
            shell_name: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack local screenci package
        run: npm pack

      - name: Run screenci init
        run: node scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} node bin/screenci.js init smoke-project --yes --verbose

      - name: Point smoke project to local screenci tarball
        run: node scripts/ci-change-to-local-screenci-build.ts

      - name: Install smoke project dependencies
        working-directory: smoke-project
        run: npm install

      - name: Run screenci test
        working-directory: smoke-project
        run: node ../scripts/ci-run-in-shell.ts ${{ matrix.shell_name }} npx screenci test
