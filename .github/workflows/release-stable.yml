name: Release Stable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.3)'
        required: true
        type: string
      release_library:
        description: 'Publish screenci npm package'
        type: boolean
        default: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.release_library
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Validate package versions
        run: |
          node -e "const screenciPkg=require('./package.json'); const createPkg=require('./create-screenci/package.json'); if (screenciPkg.version !== createPkg.version) { console.error(`Version mismatch: screenci=${screenciPkg.version}, create-screenci=${createPkg.version}`); process.exit(1); } if (createPkg.dependencies?.screenci !== screenciPkg.version) { console.error(`Dependency mismatch: create-screenci depends on screenci@${createPkg.dependencies?.screenci}, expected ${screenciPkg.version}`); process.exit(1); }"

      - name: Publish screenci to npm
        run: npm publish --provenance --access public

      - name: Publish create-screenci to npm
        working-directory: create-screenci
        run: npm publish --provenance --access public
