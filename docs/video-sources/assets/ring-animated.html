<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* Animated ring overlay page. The CSS pulse is captured deterministically
         (the virtual clock advances it frame by frame). Opacity-only, so the ring
         stays landed exactly on the element (no scale, no clipping). */
      html,
      body {
        margin: 0;
        background: transparent;
      }
      .ring {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border: 4px solid #ec4899;
        border-radius: 14px;
        animation: ring-pulse 2s ease-in-out infinite;
      }
      @keyframes ring-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div class="ring"></div>
  </body>
</html>
